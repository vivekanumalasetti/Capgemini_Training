<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1> Product Details </h1>
<table border = "1">
	<tr> 
		<th>ID</th>
		<th>NAME</th>
		<th>PRICE</th>
	</tr>
	<tr th:each = "product : ${products}">
		<td th:text = "${product.id}"></td>
		<td th:text = "${product.name}"></td>
		<td th:text = "${product.price}"></td>
	</tr>
</table>
</body>
</html>
