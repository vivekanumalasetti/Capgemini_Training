<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Adding Customer</title>
</head>
<body>
<h1> Add Customer</h1>
<form th:action = "@{/saveCustomer}" th:object = "${customer}" method = "post">
	<label>Name</label>
	<input type = "text" th:field = "*{name}"/><br><br>

	<label>Email</label>
	<input type = "text" th:field = "*{email}"/><br><br>

	<label>Contact Number</label>
	<input type = "text" th:field = "*{contactNumber}"/><br><br>

	<label>Address</label>
	<input type = "text" th:field = "*{address}"/><br><br>
	
	<button type = "submit"> Save Employee </button>
</form>
</body>
</html>
